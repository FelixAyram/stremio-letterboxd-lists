# Render free tier duerme tras ~15 min sin tráfico. Este ping lo mantiene despierto.
name: Keep Render awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping addon (manifest + health)
        run: |
          curl -fsS --max-time 120 "https://stremio-letterboxd-lists.onrender.com/manifest.json" -o /dev/null
          curl -fsS --max-time 120 "https://stremio-letterboxd-lists.onrender.com/api/info" -o /dev/null
