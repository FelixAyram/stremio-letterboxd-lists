# Render free: duerme tras 15 min sin tráfico. Ping ligero cada 5 min (sin warmup).
name: Keep Render awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/keepalive.yml'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping servidor (solo health — evita OOM)
        run: |
          BASE="https://stremio-letterboxd-lists.onrender.com"
          curl -fsS --max-time 60 "$BASE/api/health" -o /dev/null
          curl -fsS --max-time 60 "$BASE/manifest.json" -o /dev/null
          echo "OK $(date -u +%Y-%m-%dT%H:%M:%SZ)"
