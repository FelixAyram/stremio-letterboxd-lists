<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Letterboxd Lists — Configurar Addon Stremio</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; background: #14181c; color: #e8e8e8; }
    h1 { color: #00e054; font-size: 1.4rem; }
    h2 { font-size: 1rem; color: #00e054; margin-top: 2rem; }
    p { line-height: 1.5; color: #9ab; }
    label { display: block; margin-top: 1rem; font-size: 0.85rem; color: #9ab; }
    input { width: 100%; padding: 0.6rem; margin-top: 0.3rem; border: 1px solid #456; border-radius: 6px; background: #1c2228; color: #fff; }
    .row { display: flex; gap: 0.5rem; margin-top: 0.5rem; align-items: center; flex-wrap: wrap; }
    button { padding: 0.55rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-green { background: #00e054; color: #14181c; }
    .btn-red { background: #456; color: #fff; font-size: 0.8rem; }
    .btn-blue { background: #40bcf4; color: #14181c; margin-top: 1rem; }
    .btn-copy { background: #456; color: #fff; font-size: 0.8rem; padding: 0.35rem 0.7rem; }
    .list-item { background: #1c2228; padding: 1rem; border-radius: 8px; margin-top: 0.75rem; border: 1px solid #2a3440; }
    .manifest-box { margin-top: 0.75rem; padding: 0.75rem; background: #0d1a24; border-radius: 6px; border: 1px solid #2a3440; }
    .manifest-box strong { font-size: 0.85rem; color: #9ab; }
    .msg { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; }
    .ok { background: #0d3d1f; color: #00e054; }
    .err { background: #3d0d0d; color: #ff6b6b; }
    code { background: #14181c; padding: 0.2rem 0.4rem; border-radius: 4px; word-break: break-all; font-size: 0.85rem; }
    .saved-manifests { margin-top: 1.5rem; }
    .saved-item { background: #1c2228; padding: 1rem; border-radius: 8px; margin-top: 0.5rem; border: 1px solid #2a3440; }
    .version-badge { display: inline-block; margin-left: 0.5rem; padding: 0.15rem 0.5rem; font-size: 0.75rem; font-weight: 600; color: #00e054; background: #0d3d1f; border: 1px solid #0e4; border-radius: 999px; vertical-align: middle; }
  </style>
</head>
<body>
  <h1>Letterboxd Lists para Stremio <span class="version-badge" id="appVersion">v…</span></h1>
  <p>Cada lista de Letterboxd tiene su <strong>propio manifest</strong>. Instala solo las que quieras en Stremio.</p>

  <h2>Agregar listas</h2>
  <div id="lists"></div>
  <button type="button" class="btn-green" onclick="addList()">+ Agregar lista</button>
  <button type="button" class="btn-blue" onclick="save()">Guardar listas</button>
  <div id="msg"></div>

  <div class="saved-manifests" id="savedManifests" style="display:none">
    <h2>Tus manifests (instalar en Stremio)</h2>
    <p style="font-size:0.85rem">Addons → + → pega cada URL → Install. Tambien en <a href="https://web.stremio.com" target="_blank" rel="noopener">web.stremio.com</a>.</p>
    <p style="font-size:0.8rem;color:#6a8" id="manifestVersionNote"></p>
    <div id="manifestList"></div>
  </div>

  <script>
    const listsEl = document.getElementById('lists');
    const msgEl = document.getElementById('msg');
    const manifestListEl = document.getElementById('manifestList');
    const savedManifestsEl = document.getElementById('savedManifests');

    function listIdFromUrl(url) {
      const m = (url || '').match(/\/list\/([^/?#]+)/);
      return m ? `list-${m[1]}` : null;
    }

    function manifestForId(id) {
      return location.origin + '/list/' + id + '/manifest.json';
    }

    function copyText(text) {
      return navigator.clipboard.writeText(text).then(() => {
        msgEl.className = 'msg ok';
        msgEl.textContent = 'URL copiada.';
      });
    }

    function renderSavedManifests(lists) {
      if (!lists?.length) {
        savedManifestsEl.style.display = 'none';
        return;
      }
      savedManifestsEl.style.display = 'block';
      manifestListEl.innerHTML = lists.map(l => `
        <div class="saved-item">
          <strong>${(l.name || l.id).replace(/</g, '&lt;')}</strong>
          <p style="margin:0.4rem 0"><code>${l.manifest}</code></p>
          <button type="button" class="btn-copy" onclick="copyText('${l.manifest}')">Copiar manifest</button>
        </div>
      `).join('');
    }

    function updateItemManifest(item, id) {
      let box = item.querySelector('.manifest-box');
      if (!id) {
        if (box) box.remove();
        return;
      }
      const url = manifestForId(id);
      if (!box) {
        box = document.createElement('div');
        box.className = 'manifest-box';
        item.appendChild(box);
      }
      box.innerHTML = `
        <strong>Manifest de esta lista</strong>
        <p style="margin:0.4rem 0"><code class="murl">${url}</code></p>
        <button type="button" class="btn-copy" onclick="copyText('${url}')">Copiar</button>`;
    }

    function addList(url = '', name = '', id = '') {
      const div = document.createElement('div');
      div.className = 'list-item';
      div.dataset.listId = id || '';
      div.innerHTML = `
        <label>Nombre (opcional)</label>
        <input type="text" class="name" placeholder="Mi lista favorita" value="${name.replace(/"/g, '&quot;')}">
        <label>URL de Letterboxd</label>
        <input type="url" class="url" placeholder="https://letterboxd.com/usuario/list/mi-lista/" value="${url.replace(/"/g, '&quot;')}">
        <div class="row">
          <button type="button" class="btn-red" onclick="this.closest('.list-item').remove()">Quitar</button>
          <button type="button" class="btn-red" onclick="preview(this)">Vista previa</button>
          <span class="preview"></span>
        </div>`;
      listsEl.appendChild(div);
      if (id) updateItemManifest(div, id);
      div.querySelector('.url').addEventListener('change', () => {
        const newId = listIdFromUrl(div.querySelector('.url').value.trim());
        div.dataset.listId = newId || '';
        updateItemManifest(div, newId);
      });
    }

    async function preview(btn) {
      const item = btn.closest('.list-item');
      const url = item.querySelector('.url').value.trim();
      const span = item.querySelector('.preview');
      if (!url) return;
      span.textContent = ' cargando...';
      try {
        const r = await fetch('/api/preview?url=' + encodeURIComponent(url));
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        span.textContent = ` ✓ "${d.title}" — ${d.count} pelis`;
        if (!item.querySelector('.name').value) item.querySelector('.name').value = d.title;
        item.dataset.listId = d.id;
        updateItemManifest(item, d.id);
      } catch (e) {
        span.textContent = ' ✗ ' + e.message;
      }
    }

    async function save() {
      const items = [...listsEl.querySelectorAll('.list-item')];
      const lists = items.map(el => ({
        name: el.querySelector('.name').value.trim(),
        url: el.querySelector('.url').value.trim()
      })).filter(l => l.url);

      if (!lists.length) {
        msgEl.className = 'msg err';
        msgEl.textContent = 'Agrega al menos una URL de Letterboxd';
        return;
      }

      msgEl.className = 'msg';
      msgEl.textContent = 'Guardando... La primera carga puede tardar unos minutos.';

      try {
        const r = await fetch('/api/lists', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lists })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);

        renderSavedManifests(d.lists);
        msgEl.className = 'msg ok';
        msgEl.textContent = 'Guardado (v' + (d.version || appVersion || '?') + '). Instala cada manifest por separado en Stremio.';
      } catch (e) {
        msgEl.className = 'msg err';
        msgEl.textContent = e.message;
      }
    }

    let appVersion = '';

    fetch('/api/info').then(r => r.json()).then(d => {
      if (d.version) {
        appVersion = d.version;
        document.getElementById('appVersion').textContent = 'v' + d.version;
        const note = document.getElementById('manifestVersionNote');
        if (note) note.textContent = 'Manifests en esta version del servidor: v' + d.version;
      }
    });

    fetch('/api/lists').then(r => r.json()).then(d => {
      if (d.lists?.length) {
        d.lists.forEach(l => addList(l.url, l.name || '', l.id));
        renderSavedManifests(d.lists);
      } else {
        addList('https://letterboxd.com/ellefnning/list/for-when-you-want-to-feel-something/', 'for when you want to feel something', 'list-for-when-you-want-to-feel-something');
      }
    });
  </script>
</body>
</html>
