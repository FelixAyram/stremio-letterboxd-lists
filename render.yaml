services:
  - type: web
    name: stremio-letterboxd-lists
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /manifest.json
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SESSION_SECRET
        generateValue: true
      - key: GITHUB_REPO
        value: FelixAyram/stremio-letterboxd-lists
      - key: GITHUB_STATE_BRANCH
        value: data
      - key: GITHUB_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: LISTS_JSON
        value: '{"lists":[{"url":"https://letterboxd.com/ellefnning/list/for-when-you-want-to-feel-something/","name":"for when you want to feel something","id":"list-for-when-you-want-to-feel-something"}]}'
