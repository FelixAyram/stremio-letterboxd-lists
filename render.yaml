services:
  - type: web
    name: stremio-letterboxd-lists
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node --max-old-space-size=384 server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SESSION_SECRET
        generateValue: true
      - key: GITHUB_REPO
        value: FelixAyram/stremio-letterboxd-lists
      - key: GITHUB_STATE_BRANCH
        value: data
      - key: GITHUB_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RESOLVE_CONCURRENCY
        value: "3"
      - key: POSTER_CONCURRENCY
        value: "3"
      - key: MAX_HEAVY_OPS
        value: "2"
      - key: PRELOAD_ON_START
        value: "false"
      - key: WARMUP_ON_START
        value: "false"
      - key: PRELOAD_NEXT_PAGE
        value: "false"
      - key: POSTER_MODE
        value: letterboxd+rpdb
      - key: RPDB_POSTER_TYPE
        value: poster-default
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_ACCESS_TOKEN
        sync: false
      - key: TVDB_API_KEY
        sync: false
      - key: RPDB_API_KEY
        sync: false
      - key: LISTS_JSON
        value: '{"lists":[{"url":"https://letterboxd.com/ellefnning/list/for-when-you-want-to-feel-something/","name":"for when you want to feel something","id":"list-for-when-you-want-to-feel-something"}]}'
